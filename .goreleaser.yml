project_name: demo
builds:
  - env:
      - CGO_ENABLED=0
    ldflags: "-X github.com/shibme/demo-cli/commands.ProjectName={{.ProjectName}} -X github.com/shibme/demo-cli/commands.Version={{.Version}}"
    goarch:
      - amd64
      - arm64
    goos:
      - darwin
      - linux
      - windows
archives:
  - format: zip
snapshot:
  name_template: "{{ incpatch .Version }}-dev"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
nfpms:
  - vendor: Shibly Meeran
    homepage: https://github.com/shibme/demo-cli
    maintainer: Shibly Meeran <pkg@shib.me>
    formats:
      - apk
      - deb
      - rpm
brews:
  - name: demo
    homepage: "https://github.com/shibme/demo-cli"
    commit_author:
      name: shibme
      email: git@shib.me
    repository:
      owner: shibme
      name: homebrew-lab
      branch: main
      git:
        url: 'git@github.com:shibme/homebrew-lab.git'
        private_key: '{{ .Env.HOMEBREW_LAB_SSH_KEY }}'
dockers:
- image_templates:
  - 'shibme/demo-cli:{{ .Tag }}-amd64'
  use: buildx
  build_flag_templates:
  - "--pull"
  - "--platform=linux/amd64"
- image_templates:
  - 'shibme/demo-cli:{{ .Tag }}-arm64'
  use: buildx
  build_flag_templates:
  - "--pull"
  - "--platform=linux/arm64"
  goarch: arm64

docker_manifests:
- name_template: 'shibme/demo-cli:{{ .Tag }}'
  image_templates:
  - 'shibme/demo-cli:{{ .Tag }}-amd64'
  - 'shibme/demo-cli:{{ .Tag }}-arm64'